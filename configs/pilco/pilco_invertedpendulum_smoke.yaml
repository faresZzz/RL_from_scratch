approach: pilco
env_id: InvertedPendulum-v5

# Fast CLI/CI smoke: verifies the notebook-aligned InvertedPendulum wiring
# without claiming learning quality.
episodes: 1
max_steps_per_episode: 50
collection_horizon: 10

encode_angle: true
fixed_horizon_steps: 10

policy_type: linear_sine
n_basis: 8
policy_lr: 0.3
n_initial_beliefs: 1
cost_mode: inverted_pendulum
terminal_penalty: 10.0
action_cost_weight: 0.0001

horizon: 8
gp_fit_steps: 3
policy_opt_steps: 2
num_init_rollouts: 1
max_gp_points: 40
validation_fraction: 0.0
validation_min_points: 0
init_state_cov: 0.0001

cost_weight:
  - 0.01
  - 100.0
  - 1.0
  - 0.01
  - 2.0

exploration_noise: 0.0

eval_every: 1
eval_episodes: 1
eval_seed: 400
checkpoint_every: 1
solved_reward: 950
final_eval_episodes: 1
final_eval_seed: 900

seed: 0
output_dir: runs
